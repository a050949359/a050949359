<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="'Segoe UI','Noto Sans TC','Microsoft JhengHei','PingFang TC',sans-serif">
  <defs>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C4622D"/>
      <stop offset="1" stop-color="#E8915A"/>
    </linearGradient>
  <clipPath id="tickerClip"><rect x="80" y="535" width="1120" height="56"/></clipPath><linearGradient id="fadeL" x1="0" x2="1"><stop offset="0" stop-color="#1C1410"/><stop offset="1" stop-color="#1C1410" stop-opacity="0"/></linearGradient><linearGradient id="fadeR" x1="0" x2="1"><stop offset="0" stop-color="#1C1410" stop-opacity="0"/><stop offset="1" stop-color="#1C1410"/></linearGradient><g id="skillset"><g transform="translate(0,0)"><rect x="0" y="12" width="62" height="32" rx="16" fill="#3D2B1F" stroke="#5a4233"/><circle cx="16" cy="28" r="3.5" fill="#C4622D"/><text x="28" y="33" font-family="monospace" font-size="15" fill="#F2C49B">Go</text></g><g transform="translate(80,0)"><rect x="0" y="12" width="107" height="32" rx="16" fill="#3D2B1F" stroke="#5a4233"/><circle cx="16" cy="28" r="3.5" fill="#4A7C6F"/><text x="28" y="33" font-family="monospace" font-size="15" fill="#F2C49B">Node.js</text></g><g transform="translate(205,0)"><rect x="0" y="12" width="107" height="32" rx="16" fill="#3D2B1F" stroke="#5a4233"/><circle cx="16" cy="28" r="3.5" fill="#C4622D"/><text x="28" y="33" font-family="monospace" font-size="15" fill="#F2C49B">Laravel</text></g><g transform="translate(330,0)"><rect x="0" y="12" width="134" height="32" rx="16" fill="#3D2B1F" stroke="#5a4233"/><circle cx="16" cy="28" r="3.5" fill="#4A7C6F"/><text x="28" y="33" font-family="monospace" font-size="15" fill="#F2C49B">TypeScript</text></g><g transform="translate(482,0)"><rect x="0" y="12" width="80" height="32" rx="16" fill="#3D2B1F" stroke="#5a4233"/><circle cx="16" cy="28" r="3.5" fill="#C4622D"/><text x="28" y="33" font-family="monospace" font-size="15" fill="#F2C49B">WASM</text></g><g transform="translate(580,0)"><rect x="0" y="12" width="71" height="32" rx="16" fill="#3D2B1F" stroke="#5a4233"/><circle cx="16" cy="28" r="3.5" fill="#4A7C6F"/><text x="28" y="33" font-family="monospace" font-size="15" fill="#F2C49B">LLM</text></g><g transform="translate(669,0)"><rect x="0" y="12" width="71" height="32" rx="16" fill="#3D2B1F" stroke="#5a4233"/><circle cx="16" cy="28" r="3.5" fill="#C4622D"/><text x="28" y="33" font-family="monospace" font-size="15" fill="#F2C49B">MCP</text></g><g transform="translate(758,0)"><rect x="0" y="12" width="98" height="32" rx="16" fill="#3D2B1F" stroke="#5a4233"/><circle cx="16" cy="28" r="3.5" fill="#4A7C6F"/><text x="28" y="33" font-family="monospace" font-size="15" fill="#F2C49B">OpenCV</text></g><g transform="translate(874,0)"><rect x="0" y="12" width="116" height="32" rx="16" fill="#3D2B1F" stroke="#5a4233"/><circle cx="16" cy="28" r="3.5" fill="#C4622D"/><text x="28" y="33" font-family="monospace" font-size="15" fill="#F2C49B">LINE Bot</text></g><g transform="translate(1008,0)"><rect x="0" y="12" width="143" height="32" rx="16" fill="#3D2B1F" stroke="#5a4233"/><circle cx="16" cy="28" r="3.5" fill="#4A7C6F"/><text x="28" y="33" font-family="monospace" font-size="15" fill="#F2C49B">Web Crawler</text></g><g transform="translate(1169,0)"><rect x="0" y="12" width="89" height="32" rx="16" fill="#3D2B1F" stroke="#5a4233"/><circle cx="16" cy="28" r="3.5" fill="#C4622D"/><text x="28" y="33" font-family="monospace" font-size="15" fill="#F2C49B">MySQL</text></g><g transform="translate(1276,0)"><rect x="0" y="12" width="98" height="32" rx="16" fill="#3D2B1F" stroke="#5a4233"/><circle cx="16" cy="28" r="3.5" fill="#4A7C6F"/><text x="28" y="33" font-family="monospace" font-size="15" fill="#F2C49B">Docker</text></g><g transform="translate(1392,0)"><rect x="0" y="12" width="71" height="32" rx="16" fill="#3D2B1F" stroke="#5a4233"/><circle cx="16" cy="28" r="3.5" fill="#C4622D"/><text x="28" y="33" font-family="monospace" font-size="15" fill="#F2C49B">GCP</text></g><g transform="translate(1481,0)"><rect x="0" y="12" width="152" height="32" rx="16" fill="#3D2B1F" stroke="#5a4233"/><circle cx="16" cy="28" r="3.5" fill="#4A7C6F"/><text x="28" y="33" font-family="monospace" font-size="15" fill="#F2C49B">Oracle Cloud</text></g><g transform="translate(1651,0)"><rect x="0" y="12" width="152" height="32" rx="16" fill="#3D2B1F" stroke="#5a4233"/><circle cx="16" cy="28" r="3.5" fill="#C4622D"/><text x="28" y="33" font-family="monospace" font-size="15" fill="#F2C49B">self-hosting</text></g></g></defs>

  <rect width="1280" height="640" fill="#1C1410"/>

  <!-- accent bar grows in -->
  <rect x="80" y="80" height="12" rx="2" fill="url(#sheen)">
    <animate attributeName="width" from="0" to="180" dur="0.8s" fill="freeze"/>
  </rect>

  <!-- name fades up -->
  <text x="80" y="200" font-size="64" font-weight="700" fill="#F7EDE2" opacity="0">
    Harold Chen
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.6s" fill="freeze"/>
  </text>

  <!-- handle -->
  <text x="80" y="248" font-size="28" fill="#A8C5B8" opacity="0">
    @a050949359
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.6s" fill="freeze"/>
  </text>

  <!-- line 1 -->
  <text x="80" y="330" font-size="34" fill="#F2C49B" opacity="0">
    持續學習新技術，產出個人基礎工具
    <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.6s" fill="freeze"/>
  </text>

  <!-- line 2 with blinking cursor -->
  <text x="80" y="382" font-size="34" fill="#A8C5B8" opacity="0">
    用 AI 寫 code 就像是打電動
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.6s" fill="freeze"/>
  </text>
  <rect x="80" y="430" width="22" height="34" fill="#C4622D">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" begin="1.5s" repeatCount="indefinite"/>
  </rect>

  <!-- pulsing dot, top-right -->
  <circle cx="1180" cy="92" r="10" fill="#C4622D">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
  </circle>

  <!-- skills ticker (infinite scroll) -->
  <text x="80" y="525" font-family="monospace" font-size="13" letter-spacing="0.15em" fill="#A8C5B8" opacity="0">// stack<animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.8s" fill="freeze"/></text>
  <g clip-path="url(#tickerClip)"><g transform="translate(80,535)"><g><animateTransform attributeName="transform" type="translate" from="0 0" to="-1821 0" dur="40s" repeatCount="indefinite"/><use href="#skillset"/><use href="#skillset" x="1821"/></g></g></g>
  <rect x="80" y="535" width="64" height="56" fill="url(#fadeL)"/>
  <rect x="1136" y="535" width="64" height="56" fill="url(#fadeR)"/>
</svg>
