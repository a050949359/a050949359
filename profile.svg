<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="'Segoe UI','Noto Sans TC','Microsoft JhengHei','PingFang TC',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- accent bar grows in -->
  <rect x="80" y="80" height="12" rx="2" fill="url(#sheen)">
    <animate attributeName="width" from="0" to="180" dur="0.8s" fill="freeze"/>
  </rect>

  <!-- name fades up -->
  <text x="80" y="200" font-size="64" font-weight="700" fill="#e6edf3" opacity="0">
    Harold Chen
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.6s" fill="freeze"/>
  </text>

  <!-- handle -->
  <text x="80" y="248" font-size="28" fill="#8b949e" opacity="0">
    @a050949359
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.6s" fill="freeze"/>
  </text>

  <!-- line 1 -->
  <text x="80" y="330" font-size="34" fill="#e6edf3" opacity="0">
    這週在研究 distributed tracing 與 MCP
    <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.6s" fill="freeze"/>
  </text>

  <!-- line 2 with blinking cursor -->
  <text x="80" y="382" font-size="34" fill="#8b949e" opacity="0">
    邊開發、邊讓 Claude 更新這張圖
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.6s" fill="freeze"/>
  </text>
  <rect x="80" y="430" width="22" height="34" fill="#58a6ff">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" begin="1.5s" repeatCount="indefinite"/>
  </rect>

  <!-- footer tag -->
  <text x="80" y="572" font-size="22" letter-spacing="1" fill="#6e7681" opacity="0">
    GENERATED VIA MCP · github-profile-gen
    <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.8s" fill="freeze"/>
  </text>

  <!-- pulsing dot, top-right -->
  <circle cx="1180" cy="92" r="10" fill="#3fb950">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
